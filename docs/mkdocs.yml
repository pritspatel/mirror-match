site_name: MirrorMatch
site_description: Field-level JSON comparison tool — docs
repo_url: https://github.com/your-org/mirror-match
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: slate
      primary: blue
      accent: light blue
nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Configuration: configuration.md
  - Adapters: adapters.md
  - API reference: api.md
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed
  - toc:
      permalink: true
